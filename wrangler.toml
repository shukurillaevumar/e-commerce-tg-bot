CRYPTO_PAY_ACCEPTED_ASSETS = "USDT,TON"
CRYPTO_PAY_SWAP_TO = "USDT"
APP_TIMEZONE = "Asia/Tashkent"
DEFAULT_LANGUAGE = "ru"
PAYMENT_CURRENCY = "XTR"
DEFAULT_EXCHANGE_RATE_RUB_PER_XTR = "1"
CATALOG_IMAGE_URL = "https://cdn.jsdelivr.net/gh/shukurillaevumar/e-commerce-tg-bot@main/public/CatalogImg.png"


[[env.staging.kv_namespaces]]
binding = "APP_KV"
id = "039bdbff78eb47098eef03efc9e4ce8c"
preview_id = "77c880bab59141fbb35747aeaf36c7fa"

[[env.staging.d1_databases]]
binding = "BOT_DB"
database_name = "telegram-stars-store-bot-staging"
database_id = "b0e93450-31ac-4335-81e6-db66c85cc420"

[env.staging.triggers]
